# pxlreact settings - low-churn configuration, edited manually.
# Gameplay configuration (reactions, actions, rotations, remaps, wincheck) lives in profile.json.

[app]
# Seconds between pixel polls on the main loop; longer intervals may miss rapid changes
tick_interval = 0.025

[color]
# Default SSD (sum of squared differences) tolerance for any color check that does not set its
# own; wincheck markers are the exception and default to 0 (exact match)
default_tolerance = 4000

[devices]
# Interception hardware IDs, matched as substrings against the device list at startup
keyboard_hwid = 'HID\VID_342D&PID_E3C8&REV_0009&MI_00'
mouse_hwid = 'HID\VID_046D&PID_C08B&REV_2703&MI_00'

[intercept]
# Injection thread pool size and humanized delays (milliseconds)
max_workers = 5
min_press_delay = 50
max_press_delay = 75
min_reaction_time = 115
max_reaction_time = 288
precompute_size = 10000

[remapper]
# Poll interval (ms) for await_input so the capture loop can observe the stop flag
await_timeout_ms = 500
# Humanized hold (seconds) for injected substitute keys and mouse buttons
min_hold = 0.050
max_hold = 0.075

[trigger_log]
# Record the pixel color responsible for each reaction firing; report at exit
enabled = true
# Echo a swatch line on every trigger (noisy); false = exit report only
verbose = false
# JSON file the tally persists to (accumulates across sessions); "" disables disk I/O
path = "trigger_log.json"
# Minimum seconds between periodic saves during play; also written on exit
save_interval = 60.0
# SSD threshold for merging near-identical colors in the report; omit to use
# color.default_tolerance
# collapse_tolerance = 4000

[capture]
# Debug mode: save a PNG of the region around a reaction's pixel just before it fires
# (requires the mss package)
enabled = false
dir = "captures"
width = 400
height = 300
